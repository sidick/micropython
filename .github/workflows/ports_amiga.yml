name: amiga port

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build from'
        required: true
        default: 'amiga-port'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: stefanreinauer/amiga-gcc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Sanitise ref for artifact name
        id: refname
        run: echo "value=$(echo '${{ inputs.ref }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Ensure toolchain on PATH
        run: echo "/opt/amiga/bin" >> "$GITHUB_PATH"

      - name: Confirm toolchain
        run: m68k-amigaos-gcc --version

      - name: Cache AmiSSL SDK
        # The fetcher pins the version; key on the version string baked
        # into the script so a version bump automatically invalidates
        # the cache.
        uses: actions/cache@v5
        with:
          path: ~/.cache/amissl-sdk
          key: amissl-sdk-${{ hashFiles('ports/amiga/tools/amiga-fetch-amissl-sdk.sh') }}

      - name: Fetch AmiSSL SDK
        # Idempotent. Downloads on cache miss, ~0.25 s short-circuit
        # on cache hit. Must run BEFORE 'make submodules' because the
        # Makefile's MICROPY_PY_AMIGA_SSL=1 guard fires on every make
        # invocation, including the submodule sub-target. Default cache
        # dir is $HOME/.cache/amissl-sdk which matches the actions/cache
        # path above.
        #
        # The Makefile default AMISSL_SDK_DEV points at /amissl-cache,
        # which is where ports/amiga/tools/amiga-build.sh bind-mounts the host cache
        # locally. CI doesn't bind-mount, so symlink the host cache into
        # /amissl-cache so the Makefile's default path resolves.
        run: |
          ports/amiga/tools/amiga-fetch-amissl-sdk.sh
          ln -sfn "$HOME/.cache/amissl-sdk" /amissl-cache

      - name: Init required submodules
        # The port's manifest.py only freezes ports/amiga/modules, but the
        # frozen-content build rule unconditionally checks for
        # lib/micropython-lib/README.md whenever FROZEN_MANIFEST is set.
        run: make -C ports/amiga submodules

      - name: Build mpy-cross
        run: make -C mpy-cross -j$(nproc)

      - name: Build all variants
        run: |
          set -e
          for v in standard 68020fpu 68040; do
            echo "::group::Build $v"
            make -C ports/amiga VARIANT=$v -j$(nproc)
            echo "::endgroup::"
          done

      - name: Install lha
        # `lha` is a virtual package on Ubuntu; `lhasa` is extract-only,
        # so we install `jlha-utils` for the `jlha` creator.
        run: apt-get update && apt-get install -y --no-install-recommends jlha-utils

      - name: Stage release tree
        # Assemble a single deployment-ready tree:
        #   README.md                     (port README at top)
        #   icons/python_script.info      (WBPROJECT icon to rename)
        #   examples/                     (Amiga-port examples)
        #   micropython.<variant>         (each variant binary)
        #   micropython.<variant>.info    (WBTOOL icon for that variant)
        run: |
          set -e
          mkdir -p release/icons release/examples
          cp ports/amiga/README.md release/
          cp ports/amiga/python_script.info release/icons/
          cp -a examples/amiga/. release/examples/
          for v in standard 68020fpu 68040; do
            cp ports/amiga/build-$v/micropython release/micropython.$v
            cp ports/amiga/micropython.info release/micropython.$v.info
          done
          ls -laR release/

      - name: Pack LHA
        run: |
          set -e
          archive="micropython-amiga-${{ steps.refname.outputs.value }}-${{ steps.sha.outputs.short }}.lha"
          cd release
          # `jlha a` adds files (recursive via -r); -q suppresses
          # progress chatter. Archive lives one level up so its own
          # path isn't in the file list.
          jlha -aq ../$archive .
          cd ..
          ls -la "$archive"
          jlha -v "$archive"

      - name: Upload LHA
        uses: actions/upload-artifact@v7
        with:
          name: micropython-amiga-${{ steps.refname.outputs.value }}-${{ steps.sha.outputs.short }}
          path: micropython-amiga-${{ steps.refname.outputs.value }}-${{ steps.sha.outputs.short }}.lha
          if-no-files-found: error
